        /* ─── THE APPROVED BUTTON ─── */
        .btn-main {

            font-weight: 900;
            font-size: 15px;

            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            overflow: hidden;
            transition: 0.4s;
            border-radius: 4px;
        }

        .btn-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            transition: 0.4s cubic-bezier(0.7, 0, 0.2, 1);
            z-index: -1;
        }

        .btn-main:hover {
            color: #000;
            border-color: var(--primary);
        }

        .btn-main:hover::before {

        }

        .features-minimal {

            justify-content: center;

        }

        .features-minimal span::before {

            border-radius: 50px;
            transition: 0.3s;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .wa-btn:hover {
            background: var(--primary);
